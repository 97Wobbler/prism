# workplan.yaml — prism:search + prism:fetch 스킬 리팩토링
#
# catalog-browse → search 리네임 + 신규 fetch 스킬 생성 + 전체 참조 업데이트

meta:
  created: 2026-04-12
  spec_source: "세션 대화 — catalog-browse 리네임(search) + fetch 신규 스킬 생성"

  as_is: |
    Prism 플러그인에 2개 스킬: prism:prism (라우터), prism:catalog-browse (카탈로그 탐색).
    catalog-browse는 10개 파일에서 참조됨.
    서브에이전트에 instrument 내용을 전달하는 메커니즘 없음 — 이름만 전달되고 실제 .md 파일 내용 미탑재.

  to_be: |
    1. catalog-browse가 prism:search로 리네임되어 skills/search/SKILL.md에 존재한다.
    2. 신규 prism:fetch 스킬이 skills/fetch/SKILL.md에 존재하며, instrument를 resolve해서
       서브에이전트 프롬프트용 지시문 블록(경로 + 읽기 지시 + 간단 요약)을 반환한다.
    3. prism 라우터(SKILL.md), references(about/help/make), README, docs 내 모든
       catalog-browse 참조가 search/fetch로 업데이트되어 있다.
    4. skills/catalog-browse/ 디렉토리가 삭제되어 있다.
    5. 프로젝트 전체에 "catalog-browse" 문자열이 0건이다.

  human_gate_values:
    null: AI 단독 진행
    approve: AI 산출물 생성 후 인간 승인 대기
    execute: 인간 직접 수행

