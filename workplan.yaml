meta:
  created: 2026-04-16
  spec_source: |
    사용자와의 대화 — temp/decomposer.md의 "Critical Decomposition" 5-Phase
    시스템 프롬프트를 Prism 카탈로그의 인스트루먼트(lens/stance)로 분해
    등록하고, docs/cookbook에 조합 레시피로 재구성한다. decomposer 자체는
    Prism 스킬로 추가하지 않으며, "스킬 통째 도입 대신 인스트루먼트 조합으로
    재구성 가능하다"는 Prism의 메타 논증("instruments > personas")의 증거물로
    만든다.

  as_is: |
    - library/lenses/philosophy/ 에는 toulmin-argument-model.md 등 11개 lens 존재.
    - library/stances/philosophy/ 에는 hermeneutic-circle.md 등 5개 stance 존재.
    - library/heuristics/general.md 및 heuristics/philosophy/*.md 로 sanity-gate용
      heuristic bundle 존재.
    - docs/cookbook/ 에는 4개 레시피(security-analyst, curriculum-reviewer,
      product-strategist, film-critic). philosophy 도메인 레시피는 없음.
    - temp/decomposer.md 에 5-Phase 비판적 분해 엔진 시스템 프롬프트가
      들어와 있으나 Prism에 편입되지 않은 상태.
    - catalog.yml 은 scripts/sync_catalog.py 로 자동 생성됨 (수기 편집 금지).
    - .claude-plugin/plugin.json version: "0.4.0".

  to_be: |
    - library/lenses/philosophy/ 에 multi-layer-reading, conceptual-analysis,
      presupposition-analysis 세 개 lens 신규 등록. 각 파일은 CLASSES.md 의
      lens 4요건(defined input / executable procedure / structured output /
      confidence evaluation)을 모두 충족.
    - library/stances/philosophy/ 에 analytic-critique stance 신규 등록.
      decomposer 원본의 Constraints(도덕 판단 배제, attribution≠evidence,
      중립 출발)를 foundational commitments 로 반영.
    - catalog.yml 에 위 4개 신규 항목이 sync_catalog.py 실행으로 올바르게
      반영됨 (수기 편집 없이).
    - docs/cookbook/critical-decomposer.md 작성. 신규 3 lens + 기존
      toulmin-argument-model + analytic-critique stance + 기존 heuristic
      bundle 을 7-step 파이프라인에 매핑. decomposer Phase 5 (Verdict &
      Weak Points)는 synthesize 커스터마이즈로 처리. Phase 1 Reading A/B
      분기는 orchestration 주석으로 명시. "스킬 도입 대신 조합" 메타 논증
      포함.
    - .claude-plugin/plugin.json version: "0.4.1".
    - 모든 cookbook 레시피 참조 경로가 실재하는 파일을 가리킴.

  human_gate_values:
    null: AI 단독 진행
    approve: AI 산출물 생성 후 인간 승인 대기
    execute: 인간 직접 수행 (AI는 준비물만)

  principles:
    - "Prism 5-class 분류는 CLASSES.md 를 절대 기준으로 한다. 클래스 판정이 모호하면 CLASSES.md 의 Picking the right class 표를 따른다."
    - "catalog.yml 은 손으로 편집하지 않는다. scripts/sync_catalog.py --source bundle 로만 생성/갱신."
    - "lens 는 네 요건 전부 충족(input / procedure / output / confidence). 하나라도 빠지면 frame 또는 stance 로 재분류해야 한다."
    - "파일명 'multi-layer-reading' 으로 확정. 'surface-reading' 금지 (Best & Marcus 2009 의 기존 용어와 의미 충돌)."
    - "버전 bump 는 patch(0.4.0 → 0.4.1). AI 작업 규모가 커 보여도 사용자 관점 변화(새 도메인·새 기능 아님)로 판정."


tasks:

  - id: T01
    name: multi-layer-reading lens 작성
    blocked_by: []
    human_gate: null
    done: false
    category: docs
    estimated_size: M
    spec: |
      새 파일 생성: library/lenses/philosophy/multi-layer-reading.md

      목적: decomposer.md 의 Phase 1 (Surface Reading)을 operationalized
      lens 로 구현. 어떤 claim/utterance/짧은 텍스트를 받아 literal /
      figurative / performative / contextual 등 복수 해석(Reading A,
      Reading B, ...) 으로 분기시키고 각 해석을 후속 분석이 받을 수
      있도록 구조화한다. hermeneutic-circle stance 의 operationalized
      버전으로 포지셔닝 — frontmatter 의 underlying_class 는
      'stance' 로 표기.

      lens 4요건 필수 충족:
      1. 입력: "a claim, utterance, or short text (1-3 sentences typical)"
      2. 절차: Analytical Procedure 섹션에 5단계 내외의 실행 가능한
         단계 기술. 핵심은 (a) 액면 의미 포착 → (b) 복수 해석 후보
         생성 → (c) 층위별(의미론적/화용론적/문맥적) 근거 수집 →
         (d) 해석 간 양립가능성 평가 → (e) Reading 목록 확정.
      3. 출력: Output Format 섹션에 Reading 목록 + 각 Reading 별
         layer / evidence / plausibility 필드. decomposer.md 원본의
         "Reading A/B" 라벨링 방식 반영.
      4. confidence: 각 Reading 에 high/medium/low plausibility 부여.
         단일 해석에 수렴하면 confidence=high, 복수 해석이 남으면
         각각에 confidence 표기.

      참고 파일(열어서 포맷 모방):
      - library/lenses/philosophy/toulmin-argument-model.md
      - library/stances/philosophy/hermeneutic-circle.md (사상적 토대)

      frontmatter 필드:
        name: multi-layer-reading
        display_name: Multi-Layer Reading
        class: lens
        underlying_class: stance
        domain: philosophy
        source: 해석학 전통(Ricoeur, Gadamer) + 화용론(Grice, Austin) 을
          synthesize 한 operationalized 절차. 개별 저자 출처보다
          "composite of hermeneutic and pragmatic traditions" 로 명시.
        best_for: 3~4개 불릿
        one_liner: 한 문장 (영어, 카탈로그 triage 용)

      이름 "surface-reading" 절대 금지 (기존 문학비평 용어와 충돌).

      Red Flags 섹션 필수 — 전형적 오용(예: 모든 claim 을 억지로
      metaphorical 로 재해석, 저자 의도와 텍스트 의미 혼동 등).

      한국어 주석/설명 금지. 영어로 작성 (라이브러리 전반이 영어).
    output: library/lenses/philosophy/multi-layer-reading.md
    verify_checks:
      - "frontmatter 의 class: lens, underlying_class: stance, domain: philosophy"
      - "Analytical Procedure 가 복수 해석 후보 생성을 실제로 실행 가능하게 기술"
      - "Output Format 이 Reading 목록 + plausibility(high/medium/low) 포함"
      - "파일명이 multi-layer-reading.md (surface-reading 아님)"
      - "Red Flags 섹션 존재"

  - id: T02
    name: conceptual-analysis lens 작성
    blocked_by: []
    human_gate: null
    done: false
    category: docs
    estimated_size: M
    spec: |
      새 파일 생성: library/lenses/philosophy/conceptual-analysis.md

      목적: decomposer.md 의 Phase 2 (Conceptual Analysis)를 독립
      lens 로. 입력 claim 에 등장하는 핵심 용어·개념을 해부한다.

      decomposer 원본이 요구하는 세 가지 차원을 모두 반영:
      - Definition: 가장 관용적(charitable) 정의와 가장 비판적(critical)
        정의를 **쌍으로** 제시.
      - Boundary: 개념의 scope 시작/끝, edge cases.
      - Operationalizability: 측정/검증 가능성. 불가능하면
        unfalsifiable 플래그.

      lens 4요건:
      1. 입력: "a claim or short argument containing one or more key
         concepts to be analyzed"
      2. 절차: 개념 추출 → 쌍 정의(관용/비판) → 경계·edge case 도출 →
         조작화 가능성 평가 → 취약 개념 식별. 실행 가능하게 번호 매김.
      3. 출력: 개념별 테이블(concept / charitable def / critical def /
         boundary / operationalizability / verdict).
      4. confidence: 개념별로 "pinned"(정확히 정의됨) /
         "contested"(해석 여지 있음) / "slippery"(조작화 불가) 태그.

      참고 포맷: library/lenses/philosophy/toulmin-argument-model.md

      frontmatter:
        name: conceptual-analysis
        class: lens
        underlying_class: native
        domain: philosophy
        source: 분석철학 전통 (G.E. Moore 의 conceptual analysis,
          후기 Wittgenstein 의 language-game 이후의 정제 형태).
          구체 저자 하나로 귀속시키지 말 것 — "analytic philosophy
          tradition, from Moore (1903) to contemporary X-phi".
        best_for: 3~4개 불릿
        one_liner: 한 문장 영어

      Red Flags 섹션 필수 — 전형적 오용(예: 사전 정의 하나만 제시하고
      그치기, 경계 테스트 없이 단정, unfalsifiable 인데 그냥 넘어가기).

      영어로 작성.
    output: library/lenses/philosophy/conceptual-analysis.md
    verify_checks:
      - "관용적(charitable) 정의와 비판적(critical) 정의를 쌍으로 요구하는 절차 존재"
      - "Operationalizability / unfalsifiable 플래그 명시"
      - "Output Format 이 개념별 테이블 구조"
      - "confidence/verdict 신호 포함"

  - id: T03
    name: presupposition-analysis lens 작성
    blocked_by: []
    human_gate: null
    done: false
    category: docs
    estimated_size: M
    spec: |
      새 파일 생성: library/lenses/philosophy/presupposition-analysis.md

      목적: decomposer.md 의 Phase 3 (Presupposition Analysis)을 독립
      lens 로. 입력 claim 이 의미·참이 되기 위해 전제하는 것들을
      발굴하고 각 전제의 강도를 평가.

      decomposer 원본의 5 카테고리를 **모두** 반영:
      - Definitional: 용어 합의 가정
      - Empirical: 세계에 대한 사실 가정
      - Structural: 이분법/스펙트럼/계층 구조 가정
      - Normative: 기술(descriptive) 로 위장한 가치 판단
      - Scope: 보편 적용성 vs 맥락 의존성 가정

      각 전제에 대해:
      - 명시적으로 서술
      - plausibility 등급: strong / contested / weak
      - 전제가 실패하면 claim 이 어떻게 되는지 영향 분석

      lens 4요건:
      1. 입력: "a claim or assertion whose hidden assumptions need to be surfaced"
      2. 절차: 5 카테고리 walk → 각 카테고리당 0개 이상의 전제
         추출 → plausibility 판정 → failure impact 기술 → 가장 취약한
         전제 식별.
      3. 출력: 카테고리별 전제 목록 테이블(presupposition / category /
         plausibility / failure impact).
      4. confidence: 전체 claim 의 "presuppositional load" 를
         light / moderate / heavy 로 요약.

      참고 포맷: library/lenses/philosophy/toulmin-argument-model.md

      frontmatter:
        name: presupposition-analysis
        class: lens
        underlying_class: native
        domain: philosophy
        source: 언어철학·화용론 전통 (Frege, Strawson on
          presupposition; Stalnaker 의 common ground) 에서 파생.
        best_for: 3~4개 불릿
        one_liner: 한 문장 영어

      Red Flags 섹션 — 전형적 오용(예: 명시 전제만 나열하고 암묵 전제
      놓치기, 특정 카테고리 편중, 모든 전제를 'strong' 으로 판정하기).

      영어로 작성.
    output: library/lenses/philosophy/presupposition-analysis.md
    verify_checks:
      - "definitional/empirical/structural/normative/scope 5 카테고리 모두 등장"
      - "plausibility 등급(strong/contested/weak) 명시"
      - "각 전제별 failure impact 필드 요구"
      - "Red Flags 섹션 존재"

  - id: T04
    name: analytic-critique stance 작성
    blocked_by: []
    human_gate: null
    done: false
    category: docs
    estimated_size: M
    spec: |
      새 파일 생성: library/stances/philosophy/analytic-critique.md

      목적: decomposer.md 의 Constraints 섹션을 stance 로 형상화.
      어떤 claim 이든 만나면 (1) 도덕적 선악 판단 배제 (2) 참·거짓
      사전 가정 없이 중립 출발 (3) attribution 과 evidence 분리
      (누가 말했는지가 주장 타당성의 근거가 아님) (4) vague claim
      은 분석 전에 context 요구 — 이 네 가지 interpretive commitment
      를 가진 분석적 태도.

      stance 클래스는 procedure 가 아니라 commitments 와 guiding
      questions 를 가진다는 점 유의 (CLASSES.md 참조).

      참고 포맷: library/stances/philosophy/hermeneutic-circle.md
      섹션 구조 동일하게:
        Overview / Foundational Commitments / Guiding Questions /
        What It Reveals / What It Obscures / Output Format

      Foundational Commitments 에 네 가지 commitment 를 불릿으로 풀어
      쓰기. 각각 왜 그런 commitment 를 하는지 짧게 근거 서술.

      Guiding Questions — claim 을 만나면 이 stance 가 묻는 질문
      목록. 예: "이 주장을 도덕적 선악으로 평가하지 않고 논리·인식
      구조만으로 평가하면 어떻게 보이는가?", "저자를 제거하고도
      이 주장은 자립하는가?" 등.

      What It Reveals — 이 stance 가 드러내는 것 (형식적 오류,
      논증 구조, 전제의 취약성).
      What It Obscures — 놓치는 것 (사회적·역사적 맥락, 발화의 수행적
      효과, 권력 관계 — 다른 stance(marxist, foucauldian 등)가 잘
      보는 것들).

      frontmatter:
        name: analytic-critique
        class: stance
        underlying_class: native
        domain: philosophy
        source: 20세기 분석철학·informal logic 전통 (Moore, Russell,
          Quine, 이후 Toulmin·Hamblin 의 argumentation theory).
        best_for: 3~4개 불릿
        one_liner: 한 문장 영어

      영어로 작성.
    output: library/stances/philosophy/analytic-critique.md
    verify_checks:
      - "class: stance, domain: philosophy"
      - "Foundational Commitments 에 네 가지 commitment 전부 포함"
      - "What It Obscures 섹션 존재 (stance 특유)"
      - "procedure 로 쓰지 않음 (stance 포맷 준수)"

  - id: T05
    name: catalog 갱신 (sync_catalog.py)
    blocked_by: [T01, T02, T03, T04]
    human_gate: null
    done: false
    category: build
    estimated_size: S
    spec: |
      scripts/sync_catalog.py 를 실행하여 catalog.yml 에 4개 신규
      항목을 등록한다.

      절차:
      1. 작업 디렉토리 /Users/whchoi/Projects/2-work-lab/prism 에서
         dry-run 먼저: python3 scripts/sync_catalog.py --source bundle --dry-run
      2. dry-run 결과에 네 개 신규 항목(multi-layer-reading,
         conceptual-analysis, presupposition-analysis, analytic-critique)
         이 추가 대상으로 나오는지 확인.
      3. 실제 실행: python3 scripts/sync_catalog.py --source bundle
      4. catalog.yml 의 변경된 hunks 에서 네 항목 존재 확인.

      catalog.yml 을 손으로 편집하지 말 것 — 절대 금지.
      스크립트가 어떤 이유로든 실패하면 정지하고 메인에 보고.
    output: catalog.yml
    verify_checks:
      - "catalog.yml 에 name: multi-layer-reading 항목 존재"
      - "catalog.yml 에 name: conceptual-analysis 항목 존재"
      - "catalog.yml 에 name: presupposition-analysis 항목 존재"
      - "catalog.yml 에 name: analytic-critique 항목 존재"
      - "네 항목 모두 one_liner 와 path 필드 채워짐"

  - id: T06
    name: critical-decomposer cookbook 레시피 작성
    blocked_by: [T01, T02, T03, T04, T05]
    human_gate: null
    done: false
    category: docs
    estimated_size: L
    spec: |
      새 파일 생성: docs/cookbook/critical-decomposer.md

      목적: temp/decomposer.md 의 5-Phase 파이프라인을 Prism
      인스트루먼트 조합으로 재구성한 레시피. 기존 cookbook 4편의
      포맷을 그대로 따르되, 이 레시피만의 메타 논증("스킬 통째
      도입 대신 조합") 을 말미에 포함한다.

      참고 포맷(그대로 모방): docs/cookbook/security-analyst.md
      섹션 구조:
        1. (서두 박스) "This is NOT an executable agent config" 경고
        2. Persona / purpose
        3. Instruments used — Lenses / Stances / Heuristics 하위 그룹
        4. Why this composition — 왜 이 조합인가 상세 설명
        5. Workflow sketch — 7-step 테이블
        6. (신규) Reconstruction note — 메타 논증

      Instruments used 에 포함할 것:
      - Lenses (analyze step 에서 순차 실행):
        * library/lenses/philosophy/multi-layer-reading.md — usage: always
        * library/lenses/philosophy/conceptual-analysis.md — usage: always
        * library/lenses/philosophy/presupposition-analysis.md — usage: always
        * library/lenses/philosophy/toulmin-argument-model.md — usage: always
      - Stances (critical-read step):
        * library/stances/philosophy/analytic-critique.md — usage: always
      - Heuristics (sanity-gate step):
        * library/heuristics/general.md — usage: always
          (Occam, Hanlon, Chesterton's Fence, Hickam 등 formal fallacy
          점검용)
        * library/heuristics/philosophy/*.md — usage: when-relevant
          (is-ought-problem, naturalistic-fallacy, russells-teapot 등
          영역-특화 점검용)

      Why this composition 에서 반드시 다룰 것:
      - 네 lens 가 왜 이 순서인가 (multi-layer-reading → conceptual
        → presupposition → toulmin)
      - analytic-critique stance 가 왜 critical-read step 에 필요한가
        (lens 4개로 포착되지 않는 "도덕 판단 배제, attribution≠evidence"
        라는 메타-commitment 의 자리)
      - 기존 toulmin-argument-model 을 재활용하는 이유 (이미 Phase 4 와
        기능적으로 동일)
      - Phase 5 (Verdict & Weak Points) 는 왜 별도 lens 가 아닌가
        (synthesize step 의 커스터마이즈로 충분)

      Workflow sketch 7-step 테이블 — 각 step 에서 어떤 instrument 가
      어떤 역할을 하는지. 특히:
      - Step 1 (Triage): 입력이 claim/assertion/statement 임을 확인
      - Step 2 (Classify): 이 레시피는 생략. multi-layer-reading 이
        해석 분기를 담당하므로 별도 frame 불필요.
      - Step 3 (Analyze): 네 lens 를 순차 실행. **Phase 1 해석 분기의
        orchestration 주석** 필수 — multi-layer-reading 이 복수 Reading
        을 산출하면 conceptual-analysis 이후부터는 **각 Reading 별로
        병렬 실행** 해야 한다는 점 명시. 현재 Prism workflow 에 조건부
        branching 이 없다는 한계도 정직하게 서술.
      - Step 5 (Critical-read): analytic-critique stance 적용.
      - Step 6 (Sanity-gate): heuristics general + philosophy 번들.
      - Step 7 (Synthesize): **Phase 5 커스터마이즈 명시**. 출력에
        (a) strongest version (b) critical vulnerabilities 2~3개
        (c) what would change your mind — 세 필드를 synthesize
        output_format 에 포함해야 함을 서술. 예시 output 블록 삽입.

      Reconstruction note (레시피 맨 마지막 섹션, 메타 논증):
      - decomposer.md 원본은 5-Phase 고정 파이프라인을 한 덩어리
        시스템 프롬프트로 기술한 "스킬 후보" 였다.
      - 그러나 Phase 1~4 는 이미 재사용 가능한 analytical procedure
        이고, 바깥 Constraints 는 commitment 의 집합이다 — 즉 lens 네 개
        + stance 하나로 분해 가능하다.
      - 이 분해는 Prism 의 "instruments > personas" 원칙을 실증한다.
        새 스킬을 도입하는 대신 카탈로그 시민을 조합하는 것만으로
        원본과 동일한 분석적 깊이를 얻을 수 있음을 보여준다.
      - 잃는 것도 정직하게: Phase 1 의 "Reading 별 병렬 실행" 조건부
        branching 은 현 Prism workflow 에서는 레시피 주석으로 설명할
        뿐 자동 실행되지 않는다. 이는 Prism 의 현재 한계.

      영어로 작성 (기존 cookbook 4편 전부 영어).
    output: docs/cookbook/critical-decomposer.md
    verify_checks:
      - "서두에 'This is NOT an executable agent config' 경고 박스 존재"
      - "Instruments used 섹션에 4 lens + 1 stance + 2 heuristic bundle 모두 열거"
      - "Workflow sketch 7-step 테이블 존재"
      - "Step 3 (Analyze) 에 multi-layer-reading 의 Reading 별 병렬 실행 주석"
      - "Step 7 (Synthesize) 에 Phase 5 세 필드(strongest version / vulnerabilities / what would change mind) 명시"
      - "Reconstruction note 섹션에 '스킬 도입 대신 조합' 메타 논증 포함"
      - "참조한 모든 library/ 경로가 실제 존재"

