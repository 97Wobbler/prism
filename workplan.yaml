  - id: T02
    name: "fetch 스킬 생성"
    blocked_by: []
    human_gate: null
    done: true
    category: feat
    spec: |
      skills/fetch/SKILL.md를 새로 작성한다. 이 스킬의 역할:
      instrument 이름/도메인/클래스를 받아 해당 .md 파일의 절대경로를 resolve하고,
      서브에이전트 프롬프트에 삽입할 수 있는 지시문 블록을 반환한다.

      SKILL.md 구조:

      --- (frontmatter)
      name: fetch
      description: Prism instrument를 서브에이전트/에이전트/스킬에 전달할 수 있는 형태로 준비.
        instrument 이름을 받아 절대경로를 resolve하고, 서브에이전트 프롬프트에 삽입할
        지시문 블록(경로 목록 + 읽기 지시 + 간단 요약)을 반환한다.
        /prism search로 instrument를 탐색한 뒤 이 스킬로 장착하는 2단계 워크플로우.
        트리거: "/prism fetch <instrument-names>", "instrument 로드해줘",
        "서브에이전트에 렌즈 장착해줘", "fetch stride owasp-top10"
      ---

      본문 섹션:

      1. ## 역할
         - catalog-browse(search)가 "뭐가 있는지 탐색"이라면, fetch는 "선정된 것을 가져오기"
         - 서브에이전트가 instrument를 실제로 읽고 절차를 따를 수 있도록 준비

      2. ## 입력
         - instrument 이름 (slug) 1개 이상: stride, owasp-top10, systems-thinking 등
         - 또는 도메인+클래스 조합: "security lens 전부", "education frame 전부"
         - 이름이 모호하면 catalog.yml에서 후보를 보여주고 1개 확인 질문

      3. ## Resolve 알고리즘
         - catalog.yml의 3-layer 병합(project > global > bundle)으로 path 필드 확보
         - path를 절대경로로 변환 (번들: /Users/whchoi/Projects/2-work-lab/prism/ + path)
         - 파일 존재 확인. 없으면 경고하고 해당 항목 스킵
         - 각 instrument에 대해 frontmatter의 one_liner + class를 간단 요약으로 추출

      4. ## 출력 형태
         서브에이전트 프롬프트에 복사해서 넣을 수 있는 텍스트 블록을 반환.
         형식:

         ```
         ## Prism Instruments — 서브에이전트 지시문

         아래 instrument 파일들을 반드시 Read 도구로 읽고, 각 파일의 핵심 절차
         섹션(Analytical Procedure / Categories / Core Variables / Guiding Questions /
         The Rule)을 분석 워크플로우로 따르세요.

         | # | name | class | 요약 | 경로 |
         |---|------|-------|------|------|
         | 1 | stride | lens | 위협 모델링에서 STRIDE 카테고리로 시스템 자산별 위협 식별 | /Users/.../library/lenses/security/stride.md |
         | 2 | owasp-top10 | lens | OWASP Top 10 체크리스트 실행 | /Users/.../library/lenses/security/owasp-top10.md |

         ### 사용법
         - 각 파일을 Read로 열고, 해당 class의 핵심 섹션을 작업 절차로 따르세요.
         - lens: "Analytical Procedure" 섹션의 단계를 순서대로 실행
         - frame: "Categories" + "Classification Procedure" 적용
         - model: "Core Variables" + "Application Procedure" 적용
         - stance: "Guiding Questions"로 분석 관점 설정
         - heuristic: "The Rule" + "When It Applies"를 체크포인트로 활용
         ```

      5. ## 운영 규칙
         - READ-ONLY: 파일 생성/수정 없음
         - catalog.yml 최신 상태를 매번 읽음 (캐시하지 않음)
         - instrument 10개 초과 요청 시 경고: "서브에이전트 프롬프트가 길어질 수 있습니다.
           핵심 instrument만 선정하시겠습니까?"
         - 전달 방식은 경로(방법 B) 고정: 서브에이전트가 직접 Read로 파일을 읽도록 유도

      6. ## NOT this skill
         - 카탈로그 탐색 → /prism search
         - instrument 생성 → /prism
         - 에이전트/스킬 직접 생성 → Claude Code 네이티브 /agents

      기존 스킬 참고:
      - /Users/whchoi/Projects/2-work-lab/prism/skills/catalog-browse/SKILL.md (3-layer resolve 패턴 참고)
      - /Users/whchoi/Projects/2-work-lab/prism/skills/prism/SKILL.md (라우터 스타일 참고)
    output: skills/fetch/SKILL.md
    verify_checks:
      - "frontmatter name이 fetch인지"
      - "resolve 알고리즘이 3-layer를 따르는지"
      - "출력 형태에 테이블 + 사용법이 포함되는지"
      - "NOT this skill 섹션이 search, prism을 정확히 참조하는지"

